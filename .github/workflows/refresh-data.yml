name: Refresh System Data

on:
  repository_dispatch:
    types: [metrics-refresh]
  schedule:
    - cron: '30 6 * * *'  # daily at 06:30 UTC (30 min after corpus metrics-refresh)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch system-metrics.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/system-metrics.json \
            --jq '.content' | base64 -d > /tmp/system-metrics.json

      - name: Fetch registry-v2.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/registry-v2.json \
            --jq '.content' | base64 -d > /tmp/registry-v2.json

      - name: Fetch system-snapshot.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/system-snapshot.json \
            --jq '.content' | base64 -d > /tmp/system-snapshot.json 2>/dev/null || echo "{}" > /tmp/system-snapshot.json

      - name: Generate data files
        run: |
          python3 scripts/generate-system-data.py \
            --metrics /tmp/system-metrics.json \
            --registry /tmp/registry-v2.json \
            --snapshot /tmp/system-snapshot.json \
            --output-dir src/data/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub Pages index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:github-pages

      - name: Commit refreshed data to a PR branch
        id: commit
        env:
          BRANCH: chore/auto-refresh-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/system-metrics.json src/data/vitals.json src/data/landing.json src/data/github-pages.json
          if git diff --staged --quiet; then
            echo "No data changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-refresh system data and github pages index"
            # main is protected (required check: build-and-deploy), so a direct
            # push is rejected (GH006). Publish to a stable bot branch instead and
            # land it via the PR + auto-merge path below.
            git push -f origin "HEAD:refs/heads/$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # main's required build-and-deploy check must report on the PR head before it
      # can merge, but GITHUB_TOKEN pushes do NOT trigger push/PR workflows. So open
      # a PR and dispatch ci.yml on the branch: workflow_dispatch is exempt from that
      # suppression, so the check runs on the head SHA, satisfies branch protection,
      # and auto-merge lands the refresh. No branch-protection or credential change
      # is required.
      - name: Open PR, run CI on it, and enable auto-merge
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: chore/auto-refresh-data
        run: |
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore: auto-refresh system data" \
              --body "Automated daily refresh of system-metrics, vitals, landing, and github-pages data. CI-gated; auto-merges when build-and-deploy is green."
          fi
          gh workflow run ci.yml --ref "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash --delete-branch \
            || echo "::warning::auto-merge could not be enabled; PR left open for review"
