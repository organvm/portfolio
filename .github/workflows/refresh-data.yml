name: Refresh System Data

on:
  repository_dispatch:
    types: [metrics-refresh]
  schedule:
    - cron: '30 6 * * *'  # daily at 06:30 UTC (30 min after corpus metrics-refresh)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch system-metrics.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/system-metrics.json \
            --jq '.content' | base64 -d > /tmp/system-metrics.json

      - name: Fetch registry-v2.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/registry-v2.json \
            --jq '.content' | base64 -d > /tmp/registry-v2.json

      - name: Fetch system-snapshot.json from corpus
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/meta-organvm/organvm-corpvs-testamentvm/contents/system-snapshot.json \
            --jq '.content' | base64 -d > /tmp/system-snapshot.json 2>/dev/null || echo "{}" > /tmp/system-snapshot.json

      - name: Generate data files
        run: |
          python3 scripts/generate-system-data.py \
            --metrics /tmp/system-metrics.json \
            --registry /tmp/registry-v2.json \
            --snapshot /tmp/system-snapshot.json \
            --output-dir src/data/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub Pages index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:github-pages

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/system-metrics.json src/data/vitals.json src/data/landing.json src/data/github-pages.json
          if git diff --staged --quiet; then
            echo "No data changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-refresh system data and github pages index"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Commits pushed with the workflow-provided GITHUB_TOKEN do NOT trigger
      # push-event workflows, so CI (build-and-deploy) never runs for the data
      # commit and the live Pages site lags main until the next human push.
      # workflow_dispatch is exempt from that suppression, so dispatch CI here.
      - name: Trigger CI deploy for the data commit
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref main
